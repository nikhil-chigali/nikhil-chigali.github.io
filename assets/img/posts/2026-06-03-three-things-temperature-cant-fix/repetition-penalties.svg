<svg xmlns="http://www.w3.org/2000/svg" width="720" height="438" viewBox="0 0 720 438" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<style>
.bg{fill:#ffffff}.bdr{stroke:#e2e8f0}
.ink{fill:#1e293b}.inks{stroke:#1e293b}
.body{fill:#475569}.sub{fill:#64748b}.mut{fill:#94a3b8}
.panel{fill:#f8fafc}.grid{stroke:#f1f5f9}.axis{stroke:#cbd5e1}
.warn{fill:#fef2f2;stroke:#fecaca}.good{fill:#f0fdf4;stroke:#bbf7d0}
.heat{fill:#fff7ed;stroke:#fed7aa}.heattx{fill:#c2410c}.heatsub{fill:#b45309}
.pillw{fill:#fee2e2}.pillwtx{fill:#b91c1c}.pillg{fill:#dcfce7}.pillgtx{fill:#15803d}
.cjunk{fill:#f1f5f9}.cjunktx{fill:#475569}.cmore{fill:#ffffff;stroke:#cbd5e1}.cmoretx{fill:#64748b}
.filt{fill:#eef2ff;stroke:#c7d2fe}
@media (prefers-color-scheme:dark){
.bg{fill:#1f2430}.bdr{stroke:#39414f}
.ink{fill:#e6e9f0}.inks{stroke:#e6e9f0}
.body{fill:#c2cad8}.sub{fill:#aab2c2}.mut{fill:#8b93a5}
.panel{fill:#272d3a}.grid{stroke:#2a3140}.axis{stroke:#525a6b}
.warn{fill:#3a2527;stroke:#5e3a3d}.good{fill:#1e3328;stroke:#356048}
.heat{fill:#3a2a1b;stroke:#6b4a2a}.heattx{fill:#fdba74}.heatsub{fill:#e8a06a}
.pillw{fill:#4a2527}.pillwtx{fill:#fca5a5}.pillg{fill:#1f3a2a}.pillgtx{fill:#86efac}
.cjunk{fill:#2b3140}.cjunktx{fill:#aeb6c6}.cmore{fill:#1f2430;stroke:#475063}.cmoretx{fill:#9aa3b5}
.filt{fill:#262b40;stroke:#434b73}
}
</style>
<rect x="2" y="2" width="716" height="434" rx="16" class="bg bdr" stroke-width="2"/>
<text x="36" y="46" font-size="19" font-weight="600" class="ink">Two ways to penalize repetition</text>
<text x="36" y="74" font-size="12.5" class="body">Each red bar is how much the penalty subtracts from a word&#8217;s score, making it less likely to be picked again.</text>
<rect x="36" y="120" width="312" height="244" rx="12" class="panel bdr" stroke-width="1.5"/>
<text x="60" y="154" font-size="16.5" font-weight="700" class="ink">Frequency penalty</text>
<text x="60" y="176" font-size="12.5" class="sub">scales with how many times it appeared</text>
<text x="60" y="212" font-size="13.5" class="ink">moonlight</text>
<text x="324" y="212" font-size="12" class="mut" text-anchor="end">appeared 3&#215;</text>
<rect x="60" y="220" width="114" height="18" rx="5" fill="#ef4444"/>
<text x="60" y="272" font-size="13.5" class="ink">silver</text>
<text x="324" y="272" font-size="12" class="mut" text-anchor="end">appeared 1&#215;</text>
<rect x="60" y="280" width="38" height="18" rx="5" fill="#ef4444"/>
<line x1="60" y1="326" x2="246" y2="326" class="axis" stroke-width="1.3"/>
<line x1="60" y1="322" x2="60" y2="330" class="axis" stroke-width="1.3"/>
<path d="M 246 322 L 246 330 L 256 326 Z" class="mut"/>
<text x="60" y="345" font-size="11.5" class="mut">larger penalty (more subtracted from score) &#8594;</text>
<rect x="384" y="120" width="312" height="244" rx="12" class="panel bdr" stroke-width="1.5"/>
<text x="408" y="154" font-size="16.5" font-weight="700" class="ink">Presence penalty</text>
<text x="408" y="176" font-size="12.5" class="sub">one flat cut if it appeared at all</text>
<text x="408" y="212" font-size="13.5" class="ink">moonlight</text>
<text x="672" y="212" font-size="12" class="mut" text-anchor="end">appeared 3&#215;</text>
<rect x="408" y="220" width="57" height="18" rx="5" fill="#ef4444"/>
<text x="408" y="272" font-size="13.5" class="ink">silver</text>
<text x="672" y="272" font-size="12" class="mut" text-anchor="end">appeared 1&#215;</text>
<rect x="408" y="280" width="57" height="18" rx="5" fill="#ef4444"/>
<line x1="408" y1="326" x2="594" y2="326" class="axis" stroke-width="1.3"/>
<line x1="408" y1="322" x2="408" y2="330" class="axis" stroke-width="1.3"/>
<path d="M 594 322 L 594 330 L 604 326 Z" class="mut"/>
<text x="408" y="345" font-size="11.5" class="mut">larger penalty (more subtracted from score) &#8594;</text>
<text x="360" y="404" font-size="13.5" font-style="italic" class="sub" text-anchor="middle">Frequency hits the 3&#215; word three times as hard; presence treats 3&#215; and 1&#215; exactly the same.</text>
</svg>