<svg xmlns="http://www.w3.org/2000/svg" width="720" height="474" viewBox="0 0 720 474" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<style>
.bg{fill:#ffffff}.bdr{stroke:#e2e8f0}
.ink{fill:#1e293b}.inks{stroke:#1e293b}
.body{fill:#475569}.sub{fill:#64748b}.mut{fill:#94a3b8}
.panel{fill:#f8fafc}.grid{stroke:#f1f5f9}.axis{stroke:#cbd5e1}
.warn{fill:#fef2f2;stroke:#fecaca}.good{fill:#f0fdf4;stroke:#bbf7d0}
.heat{fill:#fff7ed;stroke:#fed7aa}.heattx{fill:#c2410c}.heatsub{fill:#b45309}
.pillw{fill:#fee2e2}.pillwtx{fill:#b91c1c}.pillg{fill:#dcfce7}.pillgtx{fill:#15803d}
.cjunk{fill:#f1f5f9}.cjunktx{fill:#475569}.cmore{fill:#ffffff;stroke:#cbd5e1}.cmoretx{fill:#64748b}
.filt{fill:#eef2ff;stroke:#c7d2fe}
@media (prefers-color-scheme:dark){
.bg{fill:#1f2430}.bdr{stroke:#39414f}
.ink{fill:#e6e9f0}.inks{stroke:#e6e9f0}
.body{fill:#c2cad8}.sub{fill:#aab2c2}.mut{fill:#8b93a5}
.panel{fill:#272d3a}.grid{stroke:#2a3140}.axis{stroke:#525a6b}
.warn{fill:#3a2527;stroke:#5e3a3d}.good{fill:#1e3328;stroke:#356048}
.heat{fill:#3a2a1b;stroke:#6b4a2a}.heattx{fill:#fdba74}.heatsub{fill:#e8a06a}
.pillw{fill:#4a2527}.pillwtx{fill:#fca5a5}.pillg{fill:#1f3a2a}.pillgtx{fill:#86efac}
.cjunk{fill:#2b3140}.cjunktx{fill:#aeb6c6}.cmore{fill:#1f2430;stroke:#475063}.cmoretx{fill:#9aa3b5}
.filt{fill:#262b40;stroke:#434b73}
}
</style>
<rect x="2" y="2" width="716" height="470" rx="16" class="bg bdr" stroke-width="2"/>
<text x="36" y="46" font-size="19" font-weight="600" class="ink">Consistency is not correctness</text>
<rect x="216" y="116" width="196.0" height="134.0" class="panel" stroke="none"/>
<rect x="412.0" y="116" width="196.0" height="134.0" class="panel" stroke="none"/>
<rect x="216" y="250.0" width="196.0" height="134.0" class="warn" stroke="none"/>
<rect x="412.0" y="250.0" width="196.0" height="134.0" class="good" stroke="none"/>
<rect x="216" y="116" width="392" height="268" rx="4" class="bdr" fill="none" stroke-width="1.5"/>
<line x1="412.0" y1="116" x2="412.0" y2="384" class="bdr" stroke-width="1.5"/>
<line x1="216" y1="250.0" x2="608" y2="250.0" class="bdr" stroke-width="1.5"/>
<text x="314.0" y="188.0" font-size="13" class="sub" text-anchor="middle">varies &amp; wrong</text>
<text x="510.0" y="188.0" font-size="13" class="sub" text-anchor="middle">varies &amp; right</text>
<text x="314.0" y="313.0" font-size="13.5" font-weight="700" fill="#dc2626" text-anchor="middle">consistent &amp; wrong</text>
<text x="314.0" y="333.0" font-size="11" fill="#dc2626" text-anchor="middle">same wrong answer, every user</text>
<text x="510.0" y="313.0" font-size="13.5" font-weight="700" fill="#15803d" text-anchor="middle">consistent &amp; correct</text>
<text x="510.0" y="333.0" font-size="11" fill="#15803d" text-anchor="middle">the goal</text>
<line x1="216" y1="92" x2="600" y2="92" stroke="#22c55e" stroke-width="2.5"/>
<path d="M 600 86 L 600 98 L 612 92 Z" fill="#22c55e"/>
<text x="218" y="83" font-size="13" font-weight="700" class="body">more correct &#8594;</text>
<text x="612" y="83" font-size="11.5" font-weight="700" fill="#15803d" text-anchor="end">RAG &#183; tools &#183; guardrails</text>
<line x1="194" y1="116" x2="194" y2="376" stroke="#6366f1" stroke-width="2.5"/>
<path d="M 188 376 L 200 376 L 194 388 Z" fill="#6366f1"/>
<text x="181" y="182" font-size="12.5" font-weight="700" class="body" text-anchor="middle" transform="rotate(-90 181 182)">&#8592; more consistent</text>
<text x="181" y="340" font-size="12.5" font-weight="700" fill="#6366f1" text-anchor="middle" transform="rotate(-90 181 340)">lower T</text>
<text x="360" y="422" font-size="13" font-style="italic" class="sub" text-anchor="middle">Temperature only moves you down this grid: it makes the answer consistent, not correct.</text>
<text x="360" y="442" font-size="13" font-style="italic" class="sub" text-anchor="middle">A wrong answer at T = 0 is just reliably wrong; only RAG, tools, and guardrails move you right.</text>
</svg>