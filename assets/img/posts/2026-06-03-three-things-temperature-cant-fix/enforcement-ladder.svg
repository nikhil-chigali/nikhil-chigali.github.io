<svg xmlns="http://www.w3.org/2000/svg" width="720" height="496" viewBox="0 0 720 496" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<style>
.bg{fill:#ffffff}.bdr{stroke:#e2e8f0}
.ink{fill:#1e293b}.inks{stroke:#1e293b}
.body{fill:#475569}.sub{fill:#64748b}.mut{fill:#94a3b8}
.panel{fill:#f8fafc}.grid{stroke:#f1f5f9}.axis{stroke:#cbd5e1}
.warn{fill:#fef2f2;stroke:#fecaca}.good{fill:#f0fdf4;stroke:#bbf7d0}
.heat{fill:#fff7ed;stroke:#fed7aa}.heattx{fill:#c2410c}.heatsub{fill:#b45309}
.pillw{fill:#fee2e2}.pillwtx{fill:#b91c1c}.pillg{fill:#dcfce7}.pillgtx{fill:#15803d}
.cjunk{fill:#f1f5f9}.cjunktx{fill:#475569}.cmore{fill:#ffffff;stroke:#cbd5e1}.cmoretx{fill:#64748b}
.filt{fill:#eef2ff;stroke:#c7d2fe}
@media (prefers-color-scheme:dark){
.bg{fill:#1f2430}.bdr{stroke:#39414f}
.ink{fill:#e6e9f0}.inks{stroke:#e6e9f0}
.body{fill:#c2cad8}.sub{fill:#aab2c2}.mut{fill:#8b93a5}
.panel{fill:#272d3a}.grid{stroke:#2a3140}.axis{stroke:#525a6b}
.warn{fill:#3a2527;stroke:#5e3a3d}.good{fill:#1e3328;stroke:#356048}
.heat{fill:#3a2a1b;stroke:#6b4a2a}.heattx{fill:#fdba74}.heatsub{fill:#e8a06a}
.pillw{fill:#4a2527}.pillwtx{fill:#fca5a5}.pillg{fill:#1f3a2a}.pillgtx{fill:#86efac}
.cjunk{fill:#2b3140}.cjunktx{fill:#aeb6c6}.cmore{fill:#1f2430;stroke:#475063}.cmoretx{fill:#9aa3b5}
.filt{fill:#262b40;stroke:#434b73}
}
</style>
<rect x="2" y="2" width="716" height="492" rx="16" class="bg bdr" stroke-width="2"/>
<text x="36" y="44" font-size="19" font-weight="600" class="ink">From asking to enforcing</text>
<text x="36" y="66" font-size="13" class="mut">five ways to get a fixed format, weakest at the bottom</text>
<line x1="56" y1="482" x2="56" y2="98" class="axis" stroke-width="1.5"/>
<path d="M 51 104 L 61 104 L 56 94 Z" class="mut"/>
<rect x="84" y="92" width="600" height="64" rx="10" class="panel bdr" stroke-width="1"/>
<rect x="84" y="92" width="7" height="64" rx="3" fill="#6366f1"/>
<rect x="108" y="111" width="74" height="26" rx="13" fill="#6366f1"/>
<text x="145" y="129" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">ENFORCE</text>
<text x="198" y="122" font-size="15.5" font-weight="700" class="ink">Constrained decoding</text>
<text x="198" y="142" font-size="12.5" class="body">Invalid tokens are masked. The model cannot break the schema.</text>
<rect x="84" y="166" width="600" height="64" rx="10" class="panel bdr" stroke-width="1"/>
<rect x="84" y="166" width="7" height="64" rx="3" fill="#6366f1"/>
<rect x="108" y="185" width="74" height="26" rx="13" fill="#6366f1"/>
<text x="145" y="203" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">ENFORCE</text>
<text x="198" y="196" font-size="15.5" font-weight="700" class="ink">JSON mode</text>
<text x="198" y="216" font-size="12.5" class="body">The decoder guarantees syntactically valid JSON.</text>
<rect x="84" y="270" width="600" height="64" rx="10" class="panel bdr" stroke-width="1"/>
<rect x="84" y="270" width="7" height="64" rx="3" fill="#f59e0b"/>
<rect x="108" y="289" width="74" height="26" rx="13" fill="#f59e0b"/>
<text x="145" y="307" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">CHECK</text>
<text x="198" y="300" font-size="15.5" font-weight="700" class="ink">Validate &amp; retry</text>
<text x="198" y="320" font-size="12.5" class="body">Let it answer, check the output, ask again on failure.</text>
<rect x="84" y="344" width="600" height="64" rx="10" class="panel bdr" stroke-width="1"/>
<rect x="84" y="344" width="7" height="64" rx="3" fill="#9aa3b5"/>
<rect x="108" y="363" width="74" height="26" rx="13" fill="#9aa3b5"/>
<text x="145" y="381" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">ASK</text>
<text x="198" y="374" font-size="15.5" font-weight="700" class="ink">Few-shot examples</text>
<text x="198" y="394" font-size="12.5" class="body">Show the shape; the model imitates it, but is not bound to it.</text>
<rect x="84" y="418" width="600" height="64" rx="10" class="panel bdr" stroke-width="1"/>
<rect x="84" y="418" width="7" height="64" rx="3" fill="#9aa3b5"/>
<rect x="108" y="437" width="74" height="26" rx="13" fill="#9aa3b5"/>
<text x="145" y="455" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">ASK</text>
<text x="198" y="448" font-size="15.5" font-weight="700" class="ink">Prompt instruction</text>
<text x="198" y="468" font-size="12.5" class="body">“Return only JSON.” The sampler can still pick any token.</text>
<line x1="84" y1="250" x2="684" y2="250" class="axis" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="684" y="241" font-size="12" font-style="italic" class="sub" text-anchor="end">above: the format is guaranteed &#183; below: it can still break</text>
</svg>