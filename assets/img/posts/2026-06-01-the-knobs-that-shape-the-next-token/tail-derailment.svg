<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<style>
.bg{fill:#ffffff}.bdr{stroke:#e2e8f0}
.ink{fill:#1e293b}.body{fill:#475569}.sub{fill:#64748b}.mut{fill:#94a3b8}
.warn{fill:#fef2f2;stroke:#fecaca}
@media (prefers-color-scheme:dark){
.bg{fill:#1f2430}.bdr{stroke:#39414f}
.ink{fill:#e6e9f0}.body{fill:#c2cad8}.sub{fill:#aab2c2}.mut{fill:#8b93a5}
.warn{fill:#3a2527;stroke:#5e3a3d}
}
</style>
  <rect x="2" y="2" width="716" height="516" rx="16" class="bg bdr" stroke-width="2"/>

  <!-- title -->
  <text x="36" y="46" font-size="19" font-weight="600" class="ink">Prompt:&#160;&#160;<tspan class="body" font-weight="500">&#8220;My favorite season is </tspan><tspan class="ink" font-weight="700">___</tspan><tspan class="body" font-weight="500">&#8221;</tspan></text>
  <text x="36" y="72" font-size="13" class="mut">the model's odds for the next word</text>

  <!-- bars: x from 150 to 610 spans probability 0..1 (460px) -->
  <text x="138" y="113" font-size="15" class="ink" text-anchor="end">summer</text>
  <rect x="150" y="96" width="285" height="30" rx="7" fill="#6366f1"/>
  <text x="447" y="116" font-size="14" class="body">0.62</text>

  <text x="138" y="159" font-size="15" class="ink" text-anchor="end">winter</text>
  <rect x="150" y="142" width="124" height="30" rx="7" fill="#818cf8"/>
  <text x="286" y="162" font-size="14" class="body">0.27</text>

  <text x="138" y="205" font-size="15" class="ink" text-anchor="end">autumn</text>
  <rect x="150" y="188" width="46" height="30" rx="7" fill="#a5b4fc"/>
  <text x="208" y="208" font-size="14" class="body">0.10</text>

  <!-- ellipsis -->
  <g class="mut">
    <circle cx="150" cy="240" r="2.4"/>
    <circle cx="150" cy="250" r="2.4"/>
    <circle cx="150" cy="260" r="2.4"/>
  </g>

  <!-- penguin ~0.0008: a red dot instead of a visible bar (red reads on both themes) -->
  <text x="138" y="289" font-size="15" fill="#ef4444" font-weight="600" text-anchor="end">penguin</text>
  <circle cx="153" cy="283" r="4.5" fill="#ef4444"/>
  <line x1="160" y1="283" x2="300" y2="283" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="308" y="279" font-size="13.5" fill="#ef4444" font-weight="600">0.0008 &#8212; tiny, but never zero</text>
  <text x="308" y="297" font-size="13.5" fill="#ef4444">&#8230; and this draw landed here</text>

  <!-- divider -->
  <line x1="36" y1="330" x2="684" y2="330" class="bdr" stroke-width="1.5"/>

  <!-- result -->
  <text x="36" y="362" font-size="13" class="mut" letter-spacing="0.5">SAMPLED CONTINUATION</text>
  <rect x="36" y="376" width="648" height="86" rx="12" class="warn" stroke-width="1.5"/>
  <text x="58" y="412" font-size="17" class="ink">&#8220;My favorite season is <tspan fill="#dc2626" font-weight="700">penguin</tspan>, which falls in the</text>
  <text x="58" y="440" font-size="17" class="ink">months between October and the harvest&#160;&#8230;&#8221;</text>

  <!-- caption -->
  <text x="36" y="494" font-size="13.5" font-style="italic" class="sub">One unlucky draw, and every token after it bends to fit the nonsense.</text>
</svg>
