<svg xmlns="http://www.w3.org/2000/svg" width="720" height="612" viewBox="0 0 720 612" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<style>
.bg{fill:#ffffff}.bdr{stroke:#e2e8f0}
.ink{fill:#1e293b}.inks{stroke:#1e293b}
.body{fill:#475569}.sub{fill:#64748b}.mut{fill:#94a3b8}
.panel{fill:#f8fafc}.grid{stroke:#f1f5f9}.axis{stroke:#cbd5e1}
.warn{fill:#fef2f2;stroke:#fecaca}.good{fill:#f0fdf4;stroke:#bbf7d0}
.heat{fill:#fff7ed;stroke:#fed7aa}.heattx{fill:#c2410c}.heatsub{fill:#b45309}
.pillw{fill:#fee2e2}.pillwtx{fill:#b91c1c}.pillg{fill:#dcfce7}.pillgtx{fill:#15803d}
.cjunk{fill:#f1f5f9}.cjunktx{fill:#475569}.cmore{fill:#ffffff;stroke:#cbd5e1}.cmoretx{fill:#64748b}
.filt{fill:#eef2ff;stroke:#c7d2fe}
@media (prefers-color-scheme:dark){
.bg{fill:#1f2430}.bdr{stroke:#39414f}
.ink{fill:#e6e9f0}.inks{stroke:#e6e9f0}
.body{fill:#c2cad8}.sub{fill:#aab2c2}.mut{fill:#8b93a5}
.panel{fill:#272d3a}.grid{stroke:#2a3140}.axis{stroke:#525a6b}
.warn{fill:#3a2527;stroke:#5e3a3d}.good{fill:#1e3328;stroke:#356048}
.heat{fill:#3a2a1b;stroke:#6b4a2a}.heattx{fill:#fdba74}.heatsub{fill:#e8a06a}
.pillw{fill:#4a2527}.pillwtx{fill:#fca5a5}.pillg{fill:#1f3a2a}.pillgtx{fill:#86efac}
.cjunk{fill:#2b3140}.cjunktx{fill:#aeb6c6}.cmore{fill:#1f2430;stroke:#475063}.cmoretx{fill:#9aa3b5}
.filt{fill:#262b40;stroke:#434b73}
}
</style>
<rect x="2" y="2" width="716" height="608" rx="16" class="bg bdr" stroke-width="2"/>
<text x="36" y="44" font-size="19" font-weight="600" class="ink">The decoding pipeline</text>
<text x="36" y="66" font-size="13" class="mut">from one set of raw scores to a single sampled token</text>
<rect x="200" y="90" width="320" height="52" rx="12" class="panel bdr" stroke-width="1.5"/>
<text x="360" y="113" font-size="15.5" font-weight="700" class="ink" text-anchor="middle">raw logits</text>
<text x="360" y="131" font-size="12" class="sub" text-anchor="middle">one score per vocab token</text>
<line x1="360" y1="142" x2="360" y2="160" stroke="#94a3b8" stroke-width="2"/>
<path d="M 354 159 L 366 159 L 360 167 Z" fill="#94a3b8"/>
<rect x="200" y="168" width="320" height="52" rx="12" class="heat" stroke-width="1.5"/>
<text x="360" y="191" font-size="15.5" font-weight="700" class="heattx" text-anchor="middle">&#247; temperature&#160;&#160;(T)</text>
<text x="360" y="209" font-size="12" class="heatsub" text-anchor="middle">reshape: sharpen or flatten</text>
<line x1="360" y1="220" x2="360" y2="238" stroke="#94a3b8" stroke-width="2"/>
<path d="M 354 237 L 366 237 L 360 245 Z" fill="#94a3b8"/>
<rect x="200" y="246" width="320" height="52" rx="12" class="panel bdr" stroke-width="1.5"/>
<text x="360" y="269" font-size="15.5" font-weight="700" class="ink" text-anchor="middle">softmax</text>
<text x="360" y="287" font-size="12" class="sub" text-anchor="middle">scores &#8594; probabilities</text>
<line x1="360" y1="298" x2="360" y2="316" stroke="#94a3b8" stroke-width="2"/>
<path d="M 354 315 L 366 315 L 360 323 Z" fill="#94a3b8"/>
<rect x="200" y="324" width="320" height="72" rx="12" class="filt" stroke-width="1.5"/>
<rect x="268" y="338" width="64" height="26" rx="13" fill="#6366f1"/>
<text x="300" y="355" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">top-k</text>
<rect x="388" y="338" width="64" height="26" rx="13" fill="#6366f1"/>
<text x="420" y="355" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">top-p</text>
<text x="360" y="356" font-size="12.5" font-style="italic" fill="#6366f1" text-anchor="middle">and / or</text>
<text x="360" y="383" font-size="12" class="body" text-anchor="middle">trim the unlikely tail &#183; often only one</text>
<line x1="360" y1="396" x2="360" y2="414" stroke="#94a3b8" stroke-width="2"/>
<path d="M 354 413 L 366 413 L 360 421 Z" fill="#94a3b8"/>
<rect x="200" y="422" width="320" height="52" rx="12" class="panel bdr" stroke-width="1.5"/>
<text x="360" y="445" font-size="15.5" font-weight="700" class="ink" text-anchor="middle">renormalize</text>
<text x="360" y="463" font-size="12" class="sub" text-anchor="middle">rescale survivors to sum to 1</text>
<line x1="360" y1="474" x2="360" y2="492" stroke="#94a3b8" stroke-width="2"/>
<path d="M 354 491 L 366 491 L 360 499 Z" fill="#94a3b8"/>
<rect x="200" y="500" width="320" height="52" rx="12" fill="#6366f1"/>
<text x="360" y="523" font-size="15.5" font-weight="700" fill="#ffffff" text-anchor="middle">sample</text>
<text x="360" y="541" font-size="12" fill="#c7d2fe" text-anchor="middle">one weighted roll on the strip</text>
<line x1="360" y1="552" x2="360" y2="568" stroke="#94a3b8" stroke-width="2"/>
<path d="M 354 567 L 366 567 L 360 575 Z" fill="#94a3b8"/>
<text x="360" y="596" font-size="13.5" font-weight="600" class="ink" text-anchor="middle">the next word you read</text>
</svg>