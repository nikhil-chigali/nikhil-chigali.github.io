<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<style>
.bg{fill:#ffffff}.bdr{stroke:#e2e8f0}
.ink{fill:#1e293b}.inks{stroke:#1e293b}
.body{fill:#475569}.sub{fill:#64748b}.mut{fill:#94a3b8}
.panel{fill:#f8fafc}.grid{stroke:#f1f5f9}.axis{stroke:#cbd5e1}
.warn{fill:#fef2f2;stroke:#fecaca}.good{fill:#f0fdf4;stroke:#bbf7d0}
.heat{fill:#fff7ed;stroke:#fed7aa}.heattx{fill:#c2410c}.heatsub{fill:#b45309}
.pillw{fill:#fee2e2}.pillwtx{fill:#b91c1c}.pillg{fill:#dcfce7}.pillgtx{fill:#15803d}
.cjunk{fill:#f1f5f9}.cjunktx{fill:#475569}.cmore{fill:#ffffff;stroke:#cbd5e1}.cmoretx{fill:#64748b}
.filt{fill:#eef2ff;stroke:#c7d2fe}
@media (prefers-color-scheme:dark){
.bg{fill:#1f2430}.bdr{stroke:#39414f}
.ink{fill:#e6e9f0}.inks{stroke:#e6e9f0}
.body{fill:#c2cad8}.sub{fill:#aab2c2}.mut{fill:#8b93a5}
.panel{fill:#272d3a}.grid{stroke:#2a3140}.axis{stroke:#525a6b}
.warn{fill:#3a2527;stroke:#5e3a3d}.good{fill:#1e3328;stroke:#356048}
.heat{fill:#3a2a1b;stroke:#6b4a2a}.heattx{fill:#fdba74}.heatsub{fill:#e8a06a}
.pillw{fill:#4a2527}.pillwtx{fill:#fca5a5}.pillg{fill:#1f3a2a}.pillgtx{fill:#86efac}
.cjunk{fill:#2b3140}.cjunktx{fill:#aeb6c6}.cmore{fill:#1f2430;stroke:#475063}.cmoretx{fill:#9aa3b5}
.filt{fill:#262b40;stroke:#434b73}
}
</style>
<rect x="2" y="2" width="716" height="426" rx="16" class="bg bdr" stroke-width="2"/>
<text x="36" y="44" font-size="19" font-weight="600" class="ink">Two kinds of determinism</text>
<text x="36" y="66" font-size="13" class="mut">T = 0 locks the choice given the scores — not the scores themselves</text>
<rect x="270" y="92" width="180" height="44" rx="10" class="filt" stroke-width="1.5"/>
<text x="360" y="119" font-size="14.5" font-weight="700" class="ink" text-anchor="middle">T = 0: take the argmax</text>
<path d="M 360 136 L 360 154 L 180 154 L 180 172" fill="none" class="axis" stroke-width="1.5"/>
<path d="M 360 136 L 360 154 L 540 154 L 540 172" fill="none" class="axis" stroke-width="1.5"/>
<rect x="36" y="172" width="288" height="210" rx="12" class="good" stroke-width="1.5"/>
<circle cx="68" cy="204" r="13" fill="#22c55e"/>
<text x="68" y="209" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">&#10003;</text>
<text x="90" y="210" font-size="16.5" font-weight="700" class="ink">Sampling determinism</text>
<text x="60" y="246" font-size="13.5" class="body">Given one fixed list of logits,</text>
<text x="60" y="268" font-size="13.5" class="body">the argmax is a fixed fact.</text>
<text x="60" y="302" font-size="13.5" class="body">Same scores in &#8594; same token out,</text>
<text x="60" y="324" font-size="13.5" class="body">every single run.</text>
<text x="60" y="360" font-size="13" font-style="italic" class="sub">Settled. This part really is deterministic.</text>
<rect x="396" y="172" width="288" height="210" rx="12" class="warn" stroke-width="1.5"/>
<circle cx="428" cy="204" r="13" fill="#f59e0b"/>
<text x="428" y="209" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">?</text>
<text x="450" y="210" font-size="16.5" font-weight="700" class="ink">Inference determinism</text>
<text x="420" y="246" font-size="13.5" class="body">Are the logits themselves the</text>
<text x="420" y="268" font-size="13.5" class="body">same list on every run?</text>
<text x="420" y="302" font-size="13.5" class="body">In production, not guaranteed —</text>
<text x="420" y="324" font-size="13.5" class="body">the scores can wobble.</text>
<text x="420" y="360" font-size="13" font-style="italic" class="sub">Here is where &#8220;same answer twice&#8221; breaks.</text>
<text x="360" y="410" font-size="13.5" font-style="italic" class="sub" text-anchor="middle">T = 0 fixes the draw, but says nothing about the scores it draws from.</text>
</svg>