<svg xmlns="http://www.w3.org/2000/svg" width="720" height="506" viewBox="0 0 720 506" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<style>
.bg{fill:#ffffff}.bdr{stroke:#e2e8f0}
.ink{fill:#1e293b}.inks{stroke:#1e293b}
.body{fill:#475569}.sub{fill:#64748b}.mut{fill:#94a3b8}
.panel{fill:#f8fafc}.grid{stroke:#f1f5f9}.axis{stroke:#cbd5e1}
.warn{fill:#fef2f2;stroke:#fecaca}.good{fill:#f0fdf4;stroke:#bbf7d0}
.heat{fill:#fff7ed;stroke:#fed7aa}.heattx{fill:#c2410c}.heatsub{fill:#b45309}
.pillw{fill:#fee2e2}.pillwtx{fill:#b91c1c}.pillg{fill:#dcfce7}.pillgtx{fill:#15803d}
.cjunk{fill:#f1f5f9}.cjunktx{fill:#475569}.cmore{fill:#ffffff;stroke:#cbd5e1}.cmoretx{fill:#64748b}
.filt{fill:#eef2ff;stroke:#c7d2fe}
@media (prefers-color-scheme:dark){
.bg{fill:#1f2430}.bdr{stroke:#39414f}
.ink{fill:#e6e9f0}.inks{stroke:#e6e9f0}
.body{fill:#c2cad8}.sub{fill:#aab2c2}.mut{fill:#8b93a5}
.panel{fill:#272d3a}.grid{stroke:#2a3140}.axis{stroke:#525a6b}
.warn{fill:#3a2527;stroke:#5e3a3d}.good{fill:#1e3328;stroke:#356048}
.heat{fill:#3a2a1b;stroke:#6b4a2a}.heattx{fill:#fdba74}.heatsub{fill:#e8a06a}
.pillw{fill:#4a2527}.pillwtx{fill:#fca5a5}.pillg{fill:#1f3a2a}.pillgtx{fill:#86efac}
.cjunk{fill:#2b3140}.cjunktx{fill:#aeb6c6}.cmore{fill:#1f2430;stroke:#475063}.cmoretx{fill:#9aa3b5}
.filt{fill:#262b40;stroke:#434b73}
}
</style>
<rect x="2" y="2" width="716" height="502" rx="16" class="bg bdr" stroke-width="2"/>
<text x="36" y="44" font-size="19" font-weight="600" class="ink">Where the logits drift</text>
<text x="36" y="66" font-size="13" class="mut">three layers between your prompt and the scores — each can change the bits</text>
<rect x="36" y="96" width="648" height="116" rx="12" class="panel bdr" stroke-width="1"/>
<rect x="36" y="96" width="6" height="116" rx="3" fill="#6366f1"/>
<rect x="62" y="118" width="120" height="26" rx="13" fill="#6366f1"/>
<text x="122" y="136" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1.2">HARDWARE</text>
<text x="62" y="170" font-size="16" font-weight="700" class="ink">GPU floating-point isn't associative</text>
<text x="62" y="191" font-size="13" class="body">Parallel reductions sum in different orders; your batch neighbors change the kernel path.</text>
<rect x="36" y="228" width="648" height="116" rx="12" class="panel bdr" stroke-width="1"/>
<rect x="36" y="228" width="6" height="116" rx="3" fill="#8b5cf6"/>
<rect x="62" y="250" width="120" height="26" rx="13" fill="#8b5cf6"/>
<text x="122" y="268" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1.2">MODEL</text>
<text x="62" y="302" font-size="16" font-weight="700" class="ink">The model under the endpoint shifts</text>
<text x="62" y="323" font-size="13" class="body">Providers update versions silently; Mixture-of-Experts routes tokens differently per batch.</text>
<rect x="36" y="360" width="648" height="116" rx="12" class="panel bdr" stroke-width="1"/>
<rect x="36" y="360" width="6" height="116" rx="3" fill="#a855f7"/>
<rect x="62" y="382" width="120" height="26" rx="13" fill="#a855f7"/>
<text x="122" y="400" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1.2">INPUT</text>
<text x="62" y="434" font-size="16" font-weight="700" class="ink">Hidden context you didn't type</text>
<text x="62" y="455" font-size="13" class="body">Injected timestamps, user metadata, or an updated system prompt all move the logits.</text>
</svg>